<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img src="../icons/icon32.png" alt="" width="20" height="20" />
      <strong>Grabline</strong>
      <span id="status" class="status">checking…</span>
    </header>

    <section id="pairing-help" class="help" hidden>
      Not paired with the desktop app yet. Run
      <code>python -m app.native_host.install</code>
      and reload this extension.
    </section>

    <section>
      <h2>Media in this tab</h2>
      <ul id="media-list">
        <li class="empty">Nothing sniffed yet — play the media, then reopen.</li>
      </ul>
    </section>

    <footer>
      <label>
        <input type="checkbox" id="toggle-intercept" />
        Take over browser downloads
      </label>
      <label>
        <input type="checkbox" id="toggle-overlay" checked />
        Hover button on this site
      </label>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
