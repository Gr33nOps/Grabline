name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries (offscreen)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Shell-surface gate (S1 — no shell=True anywhere)
        run: |
          if grep -rn --include='*.py' 'shell=True' app packaging extension 2>/dev/null; then
            echo "::error::shell=True is forbidden by security requirement S1"
            exit 1
          fi
          echo "S1 gate passed"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy, strict on core)
        run: mypy app

      - name: Tests (segmenter, resume, kill -9 milestone)
        run: pytest
        env:
          QT_QPA_PLATFORM: offscreen
