name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: Grabline-linux-x86_64.tar.gz
            pack: tar czf Grabline-linux-x86_64.tar.gz -C dist Grabline
          - os: windows-latest
            artifact: Grabline-windows-x86_64.zip
            pack: 7z a Grabline-windows-x86_64.zip ./dist/Grabline.exe
          - os: macos-latest
            artifact: Grabline-macos.zip
            pack: ditto -c -k --sequesterRsrc --keepParent dist/Grabline.app Grabline-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt build libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Install project with packaging tools
        run: python -m pip install ".[package]"

      - name: Build with PyInstaller
        run: pyinstaller packaging/grabline.spec --distpath dist --workpath build

      - name: Package artifact
        run: ${{ matrix.pack }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      # A one-click Windows installer: installs the app, registers the native
      # host and stages the extension, adds shortcuts. Per-user, no admin.
      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $v = "${{ github.ref_name }}".TrimStart('v')
          if (-not $v) { $v = "1.0.1" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$v" packaging\grabline.iss
          Get-ChildItem dist\Grabline-Setup-*.exe | Select-Object -First 1 |
            Copy-Item -Destination Grabline-Setup-windows.exe

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Grabline-Setup-windows.exe
          path: Grabline-Setup-windows.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: sha256sum Grabline-* > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            Grabline-*
            SHA256SUMS.txt
