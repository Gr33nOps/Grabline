name: Release

# Build the desktop installers for Windows, macOS, and Linux on native
# runners, and (on a version tag) attach them to a GitHub Release.
#
#   git tag v1.3.5 && git push origin v1.3.5      # -> builds + publishes
#   or run manually from the Actions tab           # -> builds artifacts only
#
# Installers are UNSIGNED: Windows SmartScreen and macOS Gatekeeper will warn
# on first launch. Signing needs paid certificates and can be added later.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Use bash on every runner (Windows included) so steps behave identically and
# don't hit PowerShell's error-handling quirks.
defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux system libraries (Qt needs these to render the icon)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install app and build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pillow

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(python -c 'import app; print(app.__version__)')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building Grabline $V"

      - name: Render icons
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: python packaging/make_icons.py

      - name: Build macOS .icns
        if: runner.os == 'macOS'
        run: iconutil -c icns packaging/grabline.iconset -o packaging/grabline.icns

      - name: Freeze with PyInstaller
        run: pyinstaller packaging/grabline.spec --noconfirm --distpath dist --workpath build

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install innosetup --no-progress -y
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" \
            "//DAppVersion=${{ steps.ver.outputs.version }}" \
            packaging/windows/grabline.iss

      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist/dmg
          cp -R dist/Grabline.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname Grabline -srcfolder dist/dmg -ov -format UDZO \
            "dist/Grabline-${{ steps.ver.outputs.version }}.dmg"

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: bash packaging/linux/build_appimage.sh "${{ steps.ver.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: grabline-${{ runner.os }}
          path: |
            dist/Grabline-Setup-*.exe
            dist/Grabline-*.dmg
            dist/Grabline-*-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
