name: Packages

# Publishes Linux installers to GitHub Packages (GHCR) so the repo sidebar
# Packages section is populated. Linked via org.opencontainers.image.source.
#
# Prefer release/workflow_dispatch. Main-push still works, but waits until the
# matching Release assets exist (avoids racing the Release workflow).

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (empty = latest)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: packages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve tag and image name
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            # Main pushes often land before the tag Release finishes uploading
            # assets. Prefer an explicit tag when the push is itself a version
            # commit; otherwise wait for /releases/latest to appear.
            TAG="$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || true)"
            if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
              for _ in $(seq 1 24); do
                sleep 15
                TAG="$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || true)"
                if [ -n "${TAG}" ] && [ "${TAG}" != "null" ]; then
                  break
                fi
                echo "Waiting for a GitHub Release…"
              done
            fi
          fi
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "No GitHub Release found to package." >&2
            exit 1
          fi
          V="${TAG#v}"
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          {
            echo "tag=${TAG}"
            echo "version=${V}"
            echo "owner=${OWNER}"
            # New name: the old "grabline" package from the previous repo can
            # block pushes after a delete/recreate.
            echo "image=ghcr.io/${OWNER}/grabline-installers"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing ${TAG} -> ghcr.io/${OWNER}/grabline-installers:${V}"

      - name: Download Linux release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Assets may still be uploading when this job starts on a main push.
          ok=0
          for _ in $(seq 1 36); do
            if gh release download "${{ steps.meta.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --dir dist \
              --clobber \
              --pattern "Grabline-*-x86_64.AppImage" \
              --pattern "grabline_*_amd64.deb" \
              --pattern "Grabline-*-linux-x86_64.tar.gz"
            then
              if ls dist/Grabline-*-x86_64.AppImage >/dev/null 2>&1 \
                && ls dist/grabline_*_amd64.deb >/dev/null 2>&1 \
                && ls dist/Grabline-*-linux-x86_64.tar.gz >/dev/null 2>&1
              then
                ok=1
                break
              fi
            fi
            echo "Waiting for Linux release assets…"
            sleep 20
          done
          if [ "$ok" -ne 1 ]; then
            echo "Linux installers never appeared on ${{ steps.meta.outputs.tag }}" >&2
            exit 1
          fi
          ls -lah dist

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container package
        working-directory: dist
        run: |
          set -euo pipefail
          IMAGE="${{ steps.meta.outputs.image }}"
          V="${{ steps.meta.outputs.version }}"
          SRC="https://github.com/${{ github.repository }}"
          APPIMAGE="$(ls Grabline-*-x86_64.AppImage | head -1)"
          DEB="$(ls grabline_*_amd64.deb | head -1)"
          TARBALL="$(ls Grabline-*-linux-x86_64.tar.gz | head -1)"
          mv "$APPIMAGE" "GrabLine-${V}-x86_64.AppImage"
          mv "$DEB" "grabline_${V}_amd64.deb"
          mv "$TARBALL" "GrabLine-${V}-linux-x86_64.tar.gz"
          cat > Dockerfile <<EOF
FROM alpine:3.20
COPY GrabLine-${V}-x86_64.AppImage grabline_${V}_amd64.deb GrabLine-${V}-linux-x86_64.tar.gz /installers/
WORKDIR /installers
CMD ["ls", "-lah", "/installers"]
EOF
          docker build \
            --label "org.opencontainers.image.source=${SRC}" \
            --label "org.opencontainers.image.url=${SRC}" \
            --label "org.opencontainers.image.version=${V}" \
            --label "org.opencontainers.image.title=GrabLine" \
            --label "org.opencontainers.image.description=GrabLine Linux installers (AppImage, deb, tar.gz)" \
            --label "org.opencontainers.image.licenses=AGPL-3.0-or-later" \
            -t "${IMAGE}:${V}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${V}"
          docker push "${IMAGE}:latest"
          echo "Published ${IMAGE}:${V} and :latest"

      - name: Prefer public package visibility
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${{ steps.meta.outputs.owner }}"
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/grabline-installers/visibility" \
            -f visibility=public \
          || gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${OWNER}/packages/container/grabline-installers/visibility" \
            -f visibility=public \
          || echo "Set package visibility to Public in Package settings if needed."
