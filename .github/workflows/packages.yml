name: Packages

# Publishes Linux installers to GitHub Packages (GHCR) so the repo sidebar
# Packages section is populated. Linked via org.opencontainers.image.source.
#
# Runs after each Release, on a push to main (orphan release snapshot), or
# manually from the Actions tab.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (empty = latest)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: packages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve tag and image name
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name)"
          fi
          if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
            echo "No GitHub Release found to package." >&2
            exit 1
          fi
          V="${TAG#v}"
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          {
            echo "tag=${TAG}"
            echo "version=${V}"
            echo "owner=${OWNER}"
            echo "image=ghcr.io/${OWNER}/grabline"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing ${TAG} -> ghcr.io/${OWNER}/grabline:${V}"

      - name: Download Linux release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "Grabline-*-x86_64.AppImage" \
            --pattern "grabline_*_amd64.deb" \
            --pattern "Grabline-*-linux-x86_64.tar.gz"
          ls -lah dist

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: oras-project/setup-oras@v1

      - name: Push installers to GitHub Packages
        working-directory: dist
        run: |
          set -euo pipefail
          IMAGE="${{ steps.meta.outputs.image }}"
          V="${{ steps.meta.outputs.version }}"
          APPIMAGE="$(ls Grabline-*-x86_64.AppImage | head -1)"
          DEB="$(ls grabline_*_amd64.deb | head -1)"
          TARBALL="$(ls Grabline-*-linux-x86_64.tar.gz | head -1)"
          # OCI artifact linked to this repository (fills the Packages sidebar).
          oras push "${IMAGE}:${V}" \
            --artifact-type application/vnd.grabline.installers.v1+json \
            "${APPIMAGE}:application/vnd.appimage" \
            "${DEB}:application/vnd.debian.binary-package" \
            "${TARBALL}:application/gzip" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.url=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.version=${V}" \
            --annotation "org.opencontainers.image.title=GrabLine" \
            --annotation "org.opencontainers.image.description=GrabLine Linux installers (AppImage, deb, tar.gz)" \
            --annotation "org.opencontainers.image.licenses=AGPL-3.0-or-later"
          oras tag "${IMAGE}:${V}" "${IMAGE}:latest"
          echo "Published ${IMAGE}:${V} and :latest"

      - name: Prefer public package visibility
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # First publish is often private on user accounts. Best-effort flip to
          # public so visitors see Packages; if this 403s, set it once in the UI:
          # Package settings -> Change visibility -> Public.
          OWNER="${{ steps.meta.outputs.owner }}"
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/grabline/visibility" \
            -f visibility=public \
          || gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${OWNER}/packages/container/grabline/visibility" \
            -f visibility=public \
          || echo "Set package visibility to Public in the GitHub UI if the sidebar stays empty for visitors."
